<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc">
  <title id="title">AI Camp learning journey</title>
  <desc id="desc">Six connected sessions progress from machine learning to deep learning, computer vision, natural language processing, large language models, and voice agents.</desc>
  <defs>
    <linearGradient id="journey-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#0d2530"/></linearGradient>
    <linearGradient id="journey-accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#2dd4bf"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#2dd4bf"/></marker>
  </defs>
  <rect width="1200" height="390" rx="18" fill="url(#journey-bg)"/>
  <rect x="1" y="1" width="1198" height="388" rx="17" fill="none" stroke="#30363d" stroke-width="2"/>
  <g fill="none" stroke="#2dd4bf" stroke-opacity="0.7" stroke-width="2" marker-end="url(#arrow)"><path d="M342 122H446"/><path d="M738 122H842"/><path d="M994 189V233"/><path d="M842 300H738"/><path d="M446 300H342"/></g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(55 55)"><rect width="287" height="134" rx="14" fill="#111d27" stroke="#28515a"/><circle cx="38" cy="38" r="22" fill="url(#journey-accent)"/><text x="38" y="44" text-anchor="middle" fill="#071017" font-size="16" font-weight="800">01</text><text x="75" y="36" fill="#f0f6fc" font-size="20" font-weight="700">Machine Learning</text><text x="75" y="61" fill="#7dd3fc" font-size="13">DATA → MODEL → API</text><text x="24" y="98" fill="#8b949e" font-size="14">Classical models, evaluation,</text><text x="24" y="120" fill="#8b949e" font-size="14">FastAPI, Streamlit &amp; Docker</text></g>
    <g transform="translate(446 55)"><rect width="292" height="134" rx="14" fill="#111d27" stroke="#28515a"/><circle cx="38" cy="38" r="22" fill="url(#journey-accent)"/><text x="38" y="44" text-anchor="middle" fill="#071017" font-size="16" font-weight="800">02</text><text x="75" y="36" fill="#f0f6fc" font-size="20" font-weight="700">Deep Learning</text><text x="75" y="61" fill="#7dd3fc" font-size="13">FIRST PRINCIPLES</text><text x="24" y="98" fill="#8b949e" font-size="14">Neural networks, backprop,</text><text x="24" y="120" fill="#8b949e" font-size="14">PyTorch &amp; TensorFlow</text></g>
    <g transform="translate(842 55)"><rect width="303" height="134" rx="14" fill="#111d27" stroke="#28515a"/><circle cx="38" cy="38" r="22" fill="url(#journey-accent)"/><text x="38" y="44" text-anchor="middle" fill="#071017" font-size="16" font-weight="800">03</text><text x="75" y="36" fill="#f0f6fc" font-size="20" font-weight="700">Computer Vision</text><text x="75" y="61" fill="#7dd3fc" font-size="13">PIXELS → PERCEPTION</text><text x="24" y="98" fill="#8b949e" font-size="14">Image processing, features,</text><text x="24" y="120" fill="#8b949e" font-size="14">CNNs, detection &amp; tracking</text></g>
    <g transform="translate(55 233)"><rect width="287" height="124" rx="14" fill="#111d27" stroke="#28515a"/><circle cx="38" cy="38" r="22" fill="url(#journey-accent)"/><text x="38" y="44" text-anchor="middle" fill="#071017" font-size="16" font-weight="800">06</text><text x="75" y="36" fill="#f0f6fc" font-size="20" font-weight="700">Voice Agents</text><text x="75" y="61" fill="#7dd3fc" font-size="13">REAL-TIME MULTIMODAL AI</text><text x="24" y="98" fill="#8b949e" font-size="14">WebRTC, Pipecat, STT, LLM &amp; TTS</text></g>
    <g transform="translate(446 233)"><rect width="292" height="124" rx="14" fill="#111d27" stroke="#28515a"/><circle cx="38" cy="38" r="22" fill="url(#journey-accent)"/><text x="38" y="44" text-anchor="middle" fill="#071017" font-size="16" font-weight="800">05</text><text x="75" y="36" fill="#f0f6fc" font-size="20" font-weight="700">LLM Systems</text><text x="75" y="61" fill="#7dd3fc" font-size="13">RAG · AGENTS · EVALUATION</text><text x="24" y="98" fill="#8b949e" font-size="14">Build reliable language-model apps</text></g>
    <g transform="translate(842 233)"><rect width="303" height="124" rx="14" fill="#111d27" stroke="#28515a"/><circle cx="38" cy="38" r="22" fill="url(#journey-accent)"/><text x="38" y="44" text-anchor="middle" fill="#071017" font-size="16" font-weight="800">04</text><text x="75" y="36" fill="#f0f6fc" font-size="20" font-weight="700">NLP</text><text x="75" y="61" fill="#7dd3fc" font-size="13">TEXT → TRANSFORMERS</text><text x="24" y="98" fill="#8b949e" font-size="14">Embeddings, attention, BERT &amp; GPT</text></g>
  </g>
</svg>
